name: Update Exchange Rates

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest rates & generate JSON files
        run: python fetch_rates.py

      - name: Set up Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Bump npm version to today's date
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          VERSION=$(date -u +%Y.%-m.%-d)
          npm version $VERSION --no-git-tag-version --allow-same-version || true
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TODAY=$TODAY" >> $GITHUB_ENV

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit updated JSON files
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v1/
          git add package.json
          git diff --cached --quiet || git commit -m "rates: ${{ env.TODAY }}"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
